name: Integration Tests

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2

      - name: Build and test
        env:
          QBEE_USERNAME: ${{ secrets.QBEE_USERNAME }}
          QBEE_PASSWORD: ${{ secrets.QBEE_PASSWORD }}
          QBEE_BASE_URL: ${{ secrets.QBEE_BASE_URL }}
          TF_ACC: 1
        run:  go test ./... -timeout 300m